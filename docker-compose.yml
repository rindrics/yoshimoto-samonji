services:
  monolith:
    image: souzasamonji-monolith:latest
    ports:
      - "${PLUMBER_PORT}:${CONTAINER_PORT:-8000}"
    environment:
      PLUMBER_PORT: "${CONTAINER_PORT:-8000}"
    volumes:
      - ./adapters/legacy/R:/app/R
      - ./schema:/app/../../schema
    networks:
      - yoshimoto-samonji

networks:
  yoshimoto-samonji:
    driver: bridge
