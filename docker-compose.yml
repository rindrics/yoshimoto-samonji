version: '3.8'

services:
  monolith:
    build:
      context: ./adapters/legacy
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PLUMBER_PORT: 8000
    volumes:
      - ./adapters/legacy/R:/app/R
      - ./schema:/app/../../schema
    networks:
      - yoshimoto-samonji

networks:
  yoshimoto-samonji:
    driver: bridge
