services:
  monolith:
    image: ${MONOLITH_IMAGE:-yoshimotosamonji-monolith:latest}
    pull_policy: ${PULL_POLICY:-never}
    ports:
      - "${PLUMBER_PORT}:${CONTAINER_PORT:-8000}"
    environment:
      PLUMBER_PORT: "${CONTAINER_PORT:-8000}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      VALIDATE_RESPONSE: "${VALIDATE_RESPONSE:-false}"
    volumes:
      - ./adapters/legacy/R:/app/R
      - ./schema:/app/schema
    networks:
      - yoshimoto-samonji

networks:
  yoshimoto-samonji:
    driver: bridge
