name: Contract Tests

on:
  pull_request:
    paths:
      - 'schema/openapi.yaml'
      - 'adapters/legacy/**'
      - 'docker-compose.yml'
      - '.github/workflows/contract-test.yml'
  push:
    branches:
      - main
    paths:
      - 'schema/openapi.yaml'
      - 'adapters/legacy/**'

env:
  LOCAL_IMAGE: yoshimotosamonji-monolith

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build and cache plumber image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./adapters/legacy
          file: ./adapters/legacy/Dockerfile
          load: true
          tags: |
            ${{ env.LOCAL_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start plumber API
        env:
          PLUMBER_PORT: ${{ vars.PLUMBER_PORT || '8000' }}
          VALIDATE_RESPONSE: "true"
          GIT_COMMIT: ${{ github.sha }}
        run: |
          make docker-up
          sleep 5

      - name: Debug - Check docker networks
        run: |
          docker network ls | grep -i vpa || echo "No VPA network found"
          docker ps

      - name: Prepare test directories
        run: |
          mkdir -p .schemathesis .hypothesis
          chmod 777 .schemathesis .hypothesis

      - name: Run contract tests
        run: |
          make -C adapters/legacy test
        env:
          COMPOSE_PROJECT_NAME: yoshimoto-samonji

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: schemathesis-results
          path: schemathesis-result.xml

      - name: Stop services
        if: always()
        run: make docker-down
