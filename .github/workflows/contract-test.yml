name: Contract Tests

on:
  pull_request:
    paths:
      - 'services/monolith/schema/openapi.yaml'
      - 'services/monolith/**'
      - 'docker-compose.yml'
      - '.github/workflows/contract-test.yml'
  push:
    branches:
      - main
    paths:
      - 'services/monolith/schema/openapi.yaml'
      - 'services/monolith/**'

env:
  LOCAL_IMAGE: yoshimotosamonji-monolith

permissions:
  contents: write
  pull-requests: write

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build and cache plumber image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./services/monolith
          file: ./services/monolith/Dockerfile
          load: true
          tags: |
            ${{ env.LOCAL_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start plumber API
        env:
          PLUMBER_PORT: ${{ vars.PLUMBER_PORT || '8000' }}
          VALIDATE_RESPONSE: "true"
          GIT_COMMIT: ${{ github.sha }}
        run: |
          make docker-up
          sleep 5


      - name: Prepare test directories
        run: |
          mkdir -p .schemathesis .hypothesis
          chmod 777 .schemathesis .hypothesis

      - name: Run contract tests
        run: |
          make -C services/monolith test
        env:
          COMPOSE_PROJECT_NAME: yoshimoto-samonji

      - name: Prepare coverage report for deployment
        if: always() && hashFiles('.schemathesis/schema-coverage.html') != ''
        run: |
          mkdir -p .pages-deploy
          cp .schemathesis/schema-coverage.html .pages-deploy/index.html

      - name: Deploy coverage report to GitHub Pages
        if: always() && hashFiles('.pages-deploy/index.html') != ''
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  #v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .pages-deploy
          destination_dir: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}

      - name: Comment PR with coverage report link
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  #v9.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const reportUrl = `${{ github.server_url }}/${{ github.repository }}/deployments`;
            const comment = `📊 Schema Coverage Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${prNumber}/schema-coverage.html`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Stop services
        if: always()
        run: make docker-down
