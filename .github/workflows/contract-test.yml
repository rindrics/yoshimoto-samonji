name: Contract Test with Dredd

on:
  pull_request:
    paths:
      - 'schema/openapi.yaml'
      - 'adapters/legacy/**'
      - 'docker-compose.yml'
      - '.github/workflows/contract-test.yml'
  push:
    branches:
      - main
    paths:
      - 'schema/openapi.yaml'
      - 'adapters/legacy/**'

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '18'

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: '10'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start plumber API
        env:
          PLUMBER_PORT: ${{ vars.PLUMBER_PORT || '8000' }}
        run: |
          docker compose up -d monolith
          sleep 5

      - name: Run contract tests
        env:
          PLUMBER_PORT: ${{ vars.PLUMBER_PORT || '8000' }}
        run: |
          pnpm exec dredd schema/openapi.yaml http://localhost:$PLUMBER_PORT \
            --reporter=json \
            --output=dredd-result.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dredd-results
          path: dredd-result.json

      - name: Stop services
        if: always()
        run: docker compose down
